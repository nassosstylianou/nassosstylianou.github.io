<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Mexico City Guide</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--top-h:0px}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f0eb}

/* ── LAYOUT ─────────────────────────────────────────────────── */
body{display:flex;height:100dvh;overflow:hidden}

.left-panel{width:420px;flex-shrink:0;display:flex;flex-direction:column;background:#1a1a1a;color:#fff;height:100dvh;overflow:hidden}
.right-panel{flex:1;height:100dvh;overflow-y:auto;padding:0.9rem 0.9rem 4rem;-webkit-overflow-scrolling:touch}

/* ── LEFT PANEL INTERNALS ───────────────────────────────────── */
.panel-header{padding:1.1rem 1rem 0.5rem;flex-shrink:0}
.panel-header h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.3px}
.panel-header p{color:#777;font-size:0.84rem;margin-top:0.15rem}

.search-wrap{padding:0 1rem 0.5rem;position:relative;flex-shrink:0}
.search-wrap input{width:100%;padding:0.55rem 0.8rem 0.55rem 2rem;background:#242424;border:1px solid #333;border-radius:8px;color:#fff;font-size:0.87rem;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:#555}
.search-wrap input::placeholder{color:#555}
.search-icon{position:absolute;left:1.55rem;top:50%;transform:translateY(-50%);font-size:0.72rem;pointer-events:none;opacity:.7}

.filters-wrap{padding:0 1rem 0.5rem;display:flex;gap:0.28rem;flex-wrap:wrap;flex-shrink:0}
.filter-btn{padding:0.32rem 0.85rem;border-radius:20px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-size:0.79rem;font-weight:500;white-space:nowrap;transition:all .12s;flex-shrink:0;display:flex;align-items:center;gap:0.25rem}
.filter-btn:hover{border-color:#666;color:#ccc}
.filter-btn.active{background:#fff;color:#1a1a1a;border-color:#fff}

.map-status{padding:0 1rem 0.35rem;font-size:0.7rem;color:#555;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:0.5rem}
.map-status span{line-height:1.4}
.reset-btn{background:transparent;border:1px solid #333;color:#888;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.67rem;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .12s}
.reset-btn:hover{border-color:#666;color:#ccc}

.map-area{flex:1;min-height:0;position:relative}
#map{height:100%;width:100%}

/* ── CARDS ──────────────────────────────────────────────────── */
.results-header{display:flex;align-items:baseline;gap:0.5rem;margin-bottom:0.8rem}
.results-count{font-size:0.8rem;color:#888}
.in-view-tag{font-size:0.72rem;color:#aaa;font-style:italic}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:0.7rem}

.card{background:#fff;border-radius:10px;padding:1rem;border:1px solid #ece7e0;cursor:pointer;transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column;gap:0}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.09);transform:translateY(-2px)}
.card.active{box-shadow:0 0 0 2px #1a1a1a;transform:translateY(-2px)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;margin-bottom:0.3rem}
.card h3{font-size:0.9rem;font-weight:600;line-height:1.3}
.badge{display:inline-flex;align-items:center;gap:0.18rem;padding:0.14rem 0.48rem;border-radius:20px;font-size:0.65rem;font-weight:700;white-space:nowrap;flex-shrink:0}

.michelin-row{display:flex;align-items:center;gap:0.35rem;margin-bottom:0.3rem;flex-wrap:wrap}
.michelin-badge{display:inline-flex;align-items:center;gap:0.2rem;background:#1a1a1a;color:#f5c842;padding:0.1rem 0.45rem;border-radius:4px;font-size:0.64rem;font-weight:700}
.michelin-stars{letter-spacing:0.05em}

.meta-row{font-size:0.72rem;color:#999;margin-bottom:0.3rem;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap}
.meta-sep{color:#ddd}
.hours-val{color:#999;font-size:0.62rem}

.card-desc{font-size:0.79rem;color:#555;line-height:1.5;flex:1}
.note-booking{margin-top:0.45rem;font-size:0.7rem;color:#c0392b;font-weight:600;display:flex;align-items:flex-start;gap:0.25rem}
.note-award{margin-top:0.4rem;font-size:0.68rem;color:#92400e;font-weight:600;background:#fef3c7;border:1px solid #fde68a;padding:0.18rem 0.45rem;border-radius:4px;display:inline-flex;align-items:center;gap:0.25rem}
.note-info{margin-top:0.35rem;font-size:0.67rem;color:#888;font-style:italic}
.michelin-rec{display:inline-flex;align-items:center;gap:0.2rem;background:#fef3c7;color:#92400e;border:1px solid #fde68a;padding:0.1rem 0.45rem;border-radius:4px;font-size:0.64rem;font-weight:700}
.price-display{font-size:0.64rem;font-weight:700;letter-spacing:0.01em}
.price-lit{color:#1a1a1a}
.price-dim{color:#ddd}
.price-free{font-size:0.61rem;color:#059669;font-weight:700;background:#d1fae5;padding:0.07rem 0.3rem;border-radius:3px}

.card-links{display:flex;gap:0.5rem;margin-top:0.6rem;flex-wrap:wrap}
.card-links a{display:inline-flex;align-items:center;gap:0.2rem;font-size:0.7rem;color:#555;text-decoration:none;border:1px solid #e0dbd4;border-radius:5px;padding:0.18rem 0.5rem;transition:all .12s;white-space:nowrap}
.card-links a:hover{background:#f5f0eb;border-color:#ccc;color:#1a1a1a}

.no-results{text-align:center;padding:4rem 1rem;color:#aaa;grid-column:1/-1}
.no-results p{font-size:1rem;margin-bottom:0.3rem;color:#888}

/* ── BADGE COLOURS ──────────────────────────────────────────── */
.cat-restaurant{background:#fee2e2;color:#991b1b}
.cat-taqueria{background:#ffedd5;color:#9a3412}
.cat-cafe{background:#fef9c3;color:#854d0e}
.cat-museum{background:#dbeafe;color:#1e40af}
.cat-landmark{background:#d1fae5;color:#065f46}
.cat-park{background:#dcfce7;color:#166534}
.cat-activity{background:#ede9fe;color:#5b21b6}
.cat-bar{background:#fae8ff;color:#86198f}
.cat-market{background:#e0f2fe;color:#0c4a6e}
.cat-shopping{background:#fce7f3;color:#9d174d}

/* ── LEAFLET POPUP ──────────────────────────────────────────── */
.leaflet-popup-content{font-size:0.82rem;line-height:1.5;min-width:150px}
.leaflet-popup-content strong{display:block;margin-bottom:0.15rem;font-size:0.86rem}
.popup-sub{color:#666;font-size:0.74rem}
.popup-hours{color:#555;font-size:0.73rem;margin-top:0.15rem}

/* ── SEARCH HINT ─────────────────────────────────────────────── */
.search-hint{font-size:0.72rem;color:#aaa;padding:0 1rem 0.45rem;display:none;line-height:1.4}
.search-hint.visible{display:block}
.search-hint.no-results{color:#e06c5a}

/* ── MOBILE ─────────────────────────────────────────────────── */
@media(max-width:720px){
  body{flex-direction:column;height:auto;min-height:100dvh;overflow-y:auto;overflow-x:hidden}
  .left-panel{width:100%;height:auto;flex-shrink:0}
  .panel-header{padding:0.85rem 0.9rem 0.4rem;padding-top:calc(0.85rem + env(safe-area-inset-top,0))}
  .panel-header h1{font-size:1.25rem}
  .search-wrap{padding:0 0.9rem 0.45rem}
  .filters-wrap{padding:0 0.9rem 0.45rem}
  .map-status{padding:0 0.9rem 0.35rem;transition:opacity .2s}
  .map-area{height:46svh;flex:none;transition:height .25s ease,opacity .25s ease}
  .right-panel{flex:1;height:auto;overflow-y:visible;padding:0.85rem 0.85rem 5rem}
  .grid{grid-template-columns:1fr}
  body.panel-open .right-panel{display:none}
  /* Collapse map while keyboard is open so results are reachable */
  body.searching .map-area{height:20svh!important;opacity:0.7}
  body.searching .map-status{opacity:0;pointer-events:none}
}
@media(min-width:721px) and (max-width:1024px){
  .left-panel{width:340px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<!-- LEFT PANEL -->
<div class="left-panel">

    <button class="filter-btn" data-filter="market">🛒 Market</button>
    <button class="filter-btn" data-filter="shopping">🛍 Shopping</button>
  </div>
  <div class="search-hint" id="searchHint"></div>
  <div class="map-status">
    <span id="mapStatus">Loading…</span>
    <button class="reset-btn" id="resetView">Reset view</button>
  </div>
  <div class="map-area">
    <div id="map"></div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="results-header">
    <span class="results-count" id="resultsCount"></span>
    <span class="in-view-tag" id="inViewTag"></span>
  </div>
  <div class="grid" id="grid"></div>
</div>

// ── MAP SETUP ─────────────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:false}).setView([19.4200,-99.1650],12);
L.control.zoom({position:'topright'}).addTo(map);

// CartoDB Voyager
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

// Create markers
const markerMap = new Map();
PLACES.forEach(p => {
  if(!p.lat) return;
  const cat = CATS[p.category];
  const m = L.circleMarker([p.lat,p.lng],{
    radius:7, fillColor:cat.color, color:'#fff',
    weight:2, opacity:1, fillOpacity:0.88
  });
  m.bindPopup(
    `<strong>${p.name}</strong>`+
    `<div class="popup-sub">${cat.icon} ${p.area}</div>`+
    (p.hours?`<div class="popup-hours">🕐 ${p.hours}</div>`:''),
    {maxWidth:220}
  );
  m.on('click',()=>{
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
    const card = document.querySelector(`.card[data-name="${CSS.escape(p.name)}"]`);
    if(card){
      card.classList.add('active');
      document.querySelector('.right-panel').scrollTo({top:card.offsetTop-60,behavior:'smooth'});
    }
  });
  m.addTo(map);
  markerMap.set(p.name, m);
});


// ── STATE ─────────────────────────────────────────────────────────────────
let activeFilter='all', searchQuery='', isFitting=false;

function matchesCategoryAndSearch(p){
  const q=searchQuery.toLowerCase();
  const mf = activeFilter==='all'||p.category===activeFilter;
  const ms = !q||
    p.name.toLowerCase().includes(q)||
    p.area.toLowerCase().includes(q)||
    p.category.toLowerCase().includes(q)||
    CATS[p.category].label.toLowerCase().includes(q)||
    (p.description&&p.description.toLowerCase().includes(q));
  return mf&&ms;
}

function applyFilterAndSearch(){
  const preBounds = PLACES.filter(matchesCategoryAndSearch);
  // Update marker visibility
  PLACES.forEach(p=>{
    const m=markerMap.get(p.name);
    if(!m) return;
    preBounds.includes(p)?m.addTo(map):map.removeLayer(m);
  });
  // Fit map to filtered set
  const pts=preBounds.filter(p=>p.lat).map(p=>[p.lat,p.lng]);
  if(pts.length>1){
    isFitting=true;
    map.fitBounds(pts,{padding:[28,28],maxZoom:14,animate:true});
  } else if(pts.length===1){
    isFitting=true;
    map.setView(pts[0],15,{animate:true});
  } else {
    renderCards(preBounds);
  }
}

function renderCards(forcedList){
  const bounds = map.getBounds();
  const all = PLACES.filter(matchesCategoryAndSearch);
  const visible = forcedList || all.filter(p=>!p.lat||bounds.contains([p.lat,p.lng]));
  const inView = visible.length < all.length;

  // Status
  document.getElementById('mapStatus').textContent=
    `${visible.length} place${visible.length!==1?'s':''} ${inView?'in view':'shown'}`;
  document.getElementById('resultsCount').textContent=
    `${visible.length} place${visible.length!==1?'s':''}`;
  document.getElementById('inViewTag').textContent=
    inView?`of ${all.length} total (pan to explore)`:'';

  const grid=document.getElementById('grid');
  if(visible.length===0){
    grid.innerHTML=`<div class="no-results"><p>No results</p><span>Try a different search, filter, or move the map</span></div>`;
    return;
  }

  const CAT_ORDER=['restaurant','taqueria','cafe','bar','museum','landmark','park','activity','market','shopping'];
  const sorted=[...visible].sort((a,b)=>{
    const ci=CAT_ORDER.indexOf(a.category)-CAT_ORDER.indexOf(b.category);
    if(ci!==0)return ci;
    function pri(p){
      if(p.michelin===2)return[1,0];
      if(p.michelin===1)return[2,0];
      if(p.michelin==="rec")return[3,0];
      if(p.note){
        const l=p.note.toLowerCase();
        if(l.includes('#')||l.includes("world's")||l.includes('best bar')){
          const m=p.note.match(/#(\d+)/);
          return[4,m?parseInt(m[1]):999];
        }
      }
      return[5,0];
    }
    const[pa,na]=pri(a),[pb,nb]=pri(b);
    return pa!==pb?pa-pb:na-nb;
  });

  grid.innerHTML=sorted.map(p=>{
    const cat=CATS[p.category];
    const price=PRICES[p.name]??null;
    const esc=p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    const pHtml=price===null?'':
      price===0?`<span class="price-free">Free</span>`:
      `<span class="price-display"><span class="price-lit">${['','$','$$','$$$','$$$$'][price]}</span><span class="price-dim">${'$'.repeat(4-price)}</span></span>`;

    const michelinHtml=p.michelin
      ?`<div class="michelin-row">
           ${p.michelin==="rec"
             ?`<span class="michelin-rec">Bib Michelin</span>`
             :`<span class="michelin-badge">${'★'.repeat(p.michelin)} Michelin${p.michelin>1?' '+p.michelin+' Stars':' Star'}</span>`}
         </div>`
      :'';

    const hoursHtml=p.hours
      ?`<div class="hours-tag">🕐 <span class="hours-val">${p.hours}</span></div>`
      :'';

    const noteHtml=(()=>{
      if(!p.note)return'';
      const l=p.note.toLowerCase();
      if(l.includes('book')||l.includes('advance')||l.includes('reservation'))
        return`<div class="note-booking">⚠️ ${p.note}</div>`;
      if(l.includes('#')||l.includes('michelin')||l.includes("world's")||l.includes('best bar'))
        return`<div class="note-award">🏆 ${p.note}</div>`;
      return`<div class="note-info">${p.note}</div>`;
    })();

    const linksHtml=(p.instagram||p.website)
      ?`<div class="card-links">
           ${p.instagram?`<a href="https://instagram.com/${p.instagram}" target="_blank" rel="noopener"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg> Instagram</a>`:''}
           ${p.website?`<a href="${p.website}" target="_blank" rel="noopener"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> Website</a>`:''}
         </div>`
      :'';

    return`<div class="card" data-name="${p.name}" onclick="zoomTo('${esc}')">
      <div class="card-top">
        <h3>${p.name}</h3>
        <span class="badge cat-${p.category}">${cat.icon} ${cat.label}</span>
      </div>
      ${michelinHtml}
      <div class="meta-row">
        <span>📌 ${p.area}</span>
        ${pHtml?`<span class="meta-sep">·</span>${pHtml}`:''}
      </div>
      ${hoursHtml}
      <p class="card-desc">${p.description}</p>
      ${noteHtml}
      ${linksHtml}
    </div>`;
  }).join('');
}

function zoomTo(name){
  const m=markerMap.get(name);
  const p=PLACES.find(x=>x.name===name);
  if(m&&p&&p.lat){
    isFitting=true;
    map.setView([p.lat,p.lng],16,{animate:true});
    setTimeout(()=>m.openPopup(),300);
    if(window.innerWidth<=720){
      document.querySelector('.map-area').scrollIntoView({behavior:'smooth',block:'start'});
    }
  }
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  const card=document.querySelector(`.card[data-name="${name}"]`);
  if(card) card.classList.add('active');
}

// Map move → update cards
map.on('moveend zoomend',()=>{
  if(isFitting){isFitting=false;return;}
  renderCards();
});

// After programmatic fit, render
map.on('moveend',()=>{
  if(!isFitting) renderCards();
});

// Controls
const searchEl   = document.getElementById('searchInput');
const searchHint = document.getElementById('searchHint');

function updateSearchHint(){
  const q = searchEl.value.trim();
  if(!q){
    searchHint.textContent='';
    searchHint.classList.remove('visible','no-results');
    return;
  }
  const n = PLACES.filter(p=>matchesCategoryAndSearch(p)).length;
  if(n===0){
    searchHint.textContent='No results';
    searchHint.classList.add('visible','no-results');
  } else {
    searchHint.textContent=`${n} place${n!==1?'s':''} match "${q}"`;
    searchHint.classList.add('visible');
    searchHint.classList.remove('no-results');
  }
}

searchEl.addEventListener('focus',()=>{ document.body.classList.add('searching'); });
searchEl.addEventListener('blur', ()=>{ document.body.classList.remove('searching'); });
searchEl.addEventListener('keydown',e=>{ if(e.key==='Enter') searchEl.blur(); });

searchEl.addEventListener('input',e=>{
  searchQuery=e.target.value;
  applyFilterAndSearch();
  updateSearchHint();
});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.filter;
    applyFilterAndSearch();
  });
});
document.getElementById('resetView').addEventListener('click',()=>{
  activeFilter='all';
  searchQuery='';
  searchEl.value='';
  updateSearchHint();
  document.body.classList.remove('searching');
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
  PLACES.forEach(p=>{ const m=markerMap.get(p.name); if(m) m.addTo(map); });
  isFitting=true;
  map.setView([19.4200,-99.1650],12,{animate:true});
});

// Init — show all markers at default view without fitting bounds
PLACES.forEach(p=>{ const m=markerMap.get(p.name); if(m) m.addTo(map); });
renderCards();
</script>
